services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: queue
      POSTGRES_PASSWORD: queue
      POSTGRES_DB: queue
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queue -d queue"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - queue_pg:/var/lib/postgresql/data

volumes:
  queue_pg:
